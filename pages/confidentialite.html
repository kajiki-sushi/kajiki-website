<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAJIKI® — Confidentialité</title>

  <link rel="icon" type="image/png" href="../assets/icons/favicon.png?v=10">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png?v=10">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=block" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css?v=10">
</head>

<body>

  <header class="site-header">
    <a href="/" class="signature">KAJIKI<sup>®</sup></a>
  </header>

  <main class="info-page">

    <div class="info-content">
      <h1 class="display-title info-title">Confidentialité</h1>

      <div class="specsheet--admin">
        <div class="specsheet-row">
          <div class="specsheet-label">Donnée</div>
          <div class="specsheet-divider" aria-hidden="true"></div>
          <div class="specsheet-value">Adresse email</div>
        </div>

        <div class="specsheet-row">
          <div class="specsheet-label">Finalité</div>
          <div class="specsheet-divider" aria-hidden="true"></div>
          <div class="specsheet-value">Notification des prochaines dates</div>
        </div>

        <div class="specsheet-row">
          <div class="specsheet-label">Base légale</div>
          <div class="specsheet-divider" aria-hidden="true"></div>
          <div class="specsheet-value">Consentement</div>
        </div>

        <div class="specsheet-row">
          <div class="specsheet-label">Conservation</div>
          <div class="specsheet-divider" aria-hidden="true"></div>
          <div class="specsheet-value">Jusqu'à désinscription</div>
        </div>

        <div class="specsheet-row">
          <div class="specsheet-label">Partage</div>
          <div class="specsheet-divider" aria-hidden="true"></div>
          <div class="specsheet-value">Aucune donnée partagée</div>
        </div>

        <div class="specsheet-row">
          <div class="specsheet-label">Droits</div>
          <div class="specsheet-divider" aria-hidden="true"></div>
          <div class="specsheet-value">Accès, rectification,<br>suppression à tout moment</div>
        </div>
      </div>
    </div>

    <div id="site-footer"></div>
  </main>

  <script src="../js/footer.js?v=10"></script>
  <script src="../js/navigation.js?v=10"></script>
</body>
</html>
